const EXAM_DATE = new Date("2026-05-04");

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

      const voices = window.speechSynthesis.getVoices();
      // 優先順序：zh-TW > zh-HK > zh-CN > zh > 任何含 chinese/mandarin
      const zh = voices.filter(v => /^zh/i.test(v.lang) || /chinese|mandarin/i.test(v.name));
      const best = zh.find(v => /zh.TW/i.test(v.lang))
        || zh.find(v => /zh.HK/i.test(v.lang))
        || zh.find(v => /zh.CN/i.test(v.lang) || /zh$/i.test(v.lang))
        || zh[0] || null;

    };
    pickVoice();
    window.speechSynthesis.addEventListener("voiceschanged", pickVoice);
    return () => window.speechSynthesis.removeEventListener("voiceschanged", pickVoice);

                        <span style={{fontSize:18, color:C.muted, flexShrink:0,
                          display:"inline-block", transition:"transform .2s",
                          transform: isOpen ? "rotate(90deg)" : "rotate(0deg)"}}>›</span>
                      </div>

                      {isOpen && (
                        <div style={{padding:"0 16px 16px", borderTop:`1px solid ${C.border}`}}>
                          <div style={{display:"flex",justifyContent:"flex-end",paddingTop:10,paddingBottom:2}}>
                            <SpeakBtn text={`${unit.title}。${unit.why}。核心概念：${unit.core.join("。")}。考試重點：${unit.exam}。學習小技巧：${unit.tip}`}/>
                          </div>
                          <div style={{margin:"8px 0 10px", padding:"10px 12px",
                            background:`${grp.color}12`, border:`1px solid ${grp.color}30`,
                            borderRadius:8, borderLeft:`3px solid ${grp.color}`}}>
                            <div style={{fontSize:11, color:grp.color, fontWeight:700, marginBottom:4}}>為什麼要學這單元？</div>
                            <div style={{fontSize:13, lineHeight:1.6}}>{unit.why}</div>
                          </div>

                          <div style={{fontSize:12, color:C.muted, fontWeight:600, marginBottom:8, letterSpacing:.5}}>核心概念</div>
                          <div style={{marginBottom:12}}>
                            {unit.core.map((c, i) => (
                              <div key={i} style={{display:"flex", gap:8, padding:"7px 10px",
                                marginBottom:4, borderRadius:7, background:"#0b1120", border:`1px solid ${C.border}`}}>
                                <span style={{color:grp.color, fontWeight:700, flexShrink:0, fontSize:13}}>{i+1}.</span>
                                <span style={{fontSize:13, lineHeight:1.65}}>{c}</span>
                              </div>
                            ))}
                          </div>

                          <div style={{padding:"10px 12px", borderRadius:8,
                            background:"rgba(239,68,68,.08)", border:`1px solid ${C.red}40`, marginBottom:10}}>
                            <div style={{fontSize:11, color:C.red, fontWeight:700, marginBottom:4}}>🎯 考試重點</div>
                            <div style={{fontSize:13, lineHeight:1.6}}>{unit.exam}</div>
                          </div>

                          <div style={{padding:"9px 12px", borderRadius:8,
                            background:`${C.yellow}10`, border:`1px solid ${C.yellow}30`, marginBottom:12}}>
                            <span style={{fontSize:11, color:C.yellow, fontWeight:700}}>💡 學習小技巧　</span>
                            <span style={{fontSize:13, lineHeight:1.6}}>{unit.tip}</span>
                          </div>

                          <button onClick={() => {
                            setTab("chat");
                            sendMsg(`請用初學者能理解的方式，詳細說明「${unit.title}」的重點，並出一題相關考試題目考我`);
                          }} style={{
                            width:"100%", padding:"9px", borderRadius:8, border:"none",
                            background:`linear-gradient(135deg,${grp.color}cc,${grp.color})`,
                            color:"white", fontWeight:700, fontSize:13, cursor:"pointer"
                          }}>🎓 讓 AI 教練詳細說明這個單元 →</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}

        {/* ── FLASH CARDS ── */}
        {tab==="flash" && (
          <div style={{flex:1,overflow:"auto",padding:isMobile?14:24}}>
            <div style={{fontSize:isMobile?17:20,fontWeight:800,marginBottom:4,paddingLeft:isMobile?40:0}}>📚 速查卡</div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12,flexWrap:"wrap"}}>
              <span style={{fontSize:13,color:C.muted}}>{fIdx+1}/{FLASH_CARDS.length} · 點卡片翻面</span>
              <span style={{fontSize:11,padding:"2px 8px",borderRadius:4,background:`${C.border}`,color:C.muted}}>← → 換卡　空白鍵 翻面</span>
            </div>

            <div style={{display:"flex",gap:4,marginBottom:14,flexWrap:"wrap"}}>
              {FLASH_CARDS.map((_,i)=>(
                <button key={i} onClick={()=>{setFIdx(i);setFlipped(false);}} style={{width:8,height:8,borderRadius:"50%",border:"none",cursor:"pointer",background:i===fIdx?C.accent:C.border}}/>
              ))}
            </div>

            <div onClick={()=>setFlipped(p=>!p)} style={{
              maxWidth:580,minHeight:200,padding:"20px 24px",
              background:flipped?"linear-gradient(135deg,#1e3a5f,#2d1b69)":C.card,
              border:`2px solid ${flipped?C.accent:C.border}`,borderRadius:16,cursor:"pointer",marginBottom:12,transition:"all .2s"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:4,background:`${C.accent}20`,color:C.accent,fontWeight:700}}>{FLASH_CARDS[fIdx].tag}</span>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  {flipped && <SpeakBtn text={FLASH_CARDS[fIdx].title + "。" + FLASH_CARDS[fIdx].content}/>}
                  <span style={{fontSize:11,color:C.muted}}>{flipped?"📖 詳解":"❓ 點擊翻面"}</span>
                </div>
              </div>
              <div style={{fontSize:16,fontWeight:700,marginBottom:8}}>{FLASH_CARDS[fIdx].title}</div>
              {flipped
                ? <pre style={{fontSize:13,color:"#cbd5e1",whiteSpace:"pre-wrap",margin:0,lineHeight:1.75,fontFamily:"inherit"}}>{FLASH_CARDS[fIdx].content}</pre>
                : <div style={{fontSize:13,color:C.muted}}>點擊查看重點內容 →</div>
              }
            </div>

            <div style={{display:"flex",gap:8,maxWidth:580,marginBottom:18}}>
              <button onClick={()=>{setFIdx(p=>(p-1+FLASH_CARDS.length)%FLASH_CARDS.length);setFlipped(false);}}
                style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.text,cursor:"pointer",fontWeight:700}}>← 上一張</button>
              <button onClick={()=>setFlipped(p=>!p)}
                style={{flex:1,padding:"9px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.accent},${C.purple})`,color:"white",cursor:"pointer",fontWeight:700}}>翻面</button>
              <button onClick={()=>{setFIdx(p=>(p+1)%FLASH_CARDS.length);setFlipped(false);}}
                style={{flex:1,padding:"9px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.text,cursor:"pointer",fontWeight:700}}>下一張 →</button>
            </div>

            <div style={{maxWidth:580,display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:6}}>
              {FLASH_CARDS.map((c,i)=>(
                <button key={i} onClick={()=>{setFIdx(i);setFlipped(false);}} style={{
                  padding:"9px 10px",borderRadius:8,border:`1px solid ${i===fIdx?C.accent:C.border}`,
                  background:i===fIdx?"rgba(59,130,246,.1)":C.card,
                  color:i===fIdx?C.accent:C.text,cursor:"pointer",fontSize:11,fontWeight:600,textAlign:"left"}}>
                  {c.tag.includes("修正")||c.tag.includes("補充")||c.tag.includes("提醒")?"★ ":""}{c.title}
                </button>
              ))}
            </div>
          </div>
        )}

        {/* ── STUDY PLAN ── */}
        {tab==="plan" && (
          <div style={{flex:1,overflow:"auto",padding:isMobile?14:24}}>
            <div style={{fontSize:isMobile?17:20,fontWeight:800,marginBottom:4,paddingLeft:isMobile?40:0}}>📅 四週備考計畫</div>
            <div style={{fontSize:13,color:C.muted,marginBottom:14}}>距考試約30天 · 總學習時數約50小時</div>

            {STUDY_PLAN.map(w=>(
              <div key={w.week} style={{marginBottom:14,padding:"16px 18px",borderRadius:12,background:C.card,border:`1px solid ${C.border}`,borderLeft:`4px solid ${w.color}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div>
                    <span style={{fontSize:12,color:C.muted}}>第 {w.week} 週</span>
                    <div style={{fontSize:15,fontWeight:800}}>{w.theme}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:11,color:C.muted}}>單元 {w.units}</div>
                    <div style={{fontSize:14,fontWeight:700,color:w.color}}>{w.hours}</div>
                  </div>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                  {w.focus.map((f,i)=>(
                    <span key={i} style={{fontSize:11,padding:"3px 7px",borderRadius:4,
                      background:`${w.color}20`,border:`1px solid ${w.color}30`,
                      color:f.includes("★")||f.includes("缺漏")||f.includes("補充")||f.includes("官方")?w.color:C.text}}>
                      {f}
                    </span>
                  ))}
                </div>
                <div style={{fontSize:12,padding:"7px 10px",borderRadius:6,background:"rgba(255,255,255,.04)",color:w.color,fontWeight:700,marginBottom:6}}>
                  🎯 {w.goal}
                </div>
                {w.warn&&(
                  <div style={{fontSize:11,padding:"6px 10px",borderRadius:6,background:`${C.yellow}15`,border:`1px solid ${C.yellow}40`,color:C.yellow}}>
                    ⚠️ {w.warn}
                  </div>
                )}
              </div>
            ))}

            <div style={{padding:"14px 18px",borderRadius:12,background:`${C.red}10`,border:`1px solid ${C.red}40`}}>
              <div style={{fontWeight:700,color:C.red,marginBottom:8}}>⚠️ 考場答題策略</div>
              <div style={{fontSize:13,lineHeight:1.9,color:C.text}}>
                K1 記憶題：直接背誦，約 1 分鐘/題<br/>
                K2 理解題：排除法判斷，約 2 分鐘/題<br/>
                K3 應用題：逐步計算，約 3 分鐘/題<br/>
                <strong style={{color:C.teal}}>雙選題（Select TWO）：先刪去明顯錯誤選項再選2個</strong><br/>
                策略：前 30 分鐘答完全部 → 後 30 分鐘檢查修正
              </div>
            </div>
          </div>
        )}
      </div>

      <style>{`
        @keyframes bounce{0%,100%{transform:scale(.7);opacity:.4}50%{transform:scale(1.2);opacity:1}}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:#1e2d4a;border-radius:4px}
        button:hover{opacity:.88}
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ISTQBCoach />);
  </script>
</body>
</html>
